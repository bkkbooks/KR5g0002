body:
  text: 太上正一咒鬼經天師曰太上大君天之尊神左監祭酒天之真人左從百二十蛟龍右從百二十猛虎前導百二十朱雀後從百二十玄武頭上有五彩華蓋足履魁罡素男玉女衣服元氣玄氣玄黃周旋而遊生門晝夜與日月同光下統地祇上應北辰自有力士童男童女數千萬人齎持刀劍所礙者穿皆乘天鹿鳳凰騏驎窮竒辟邪數百為羣螣蛇猛獸九萬九千皆能飛行出入無間噉食百鬼數千萬人衆精百邪不得妄前天師神咒急急如律令天師曰太和玄老乘青雲紫輦華蓋玉女車輪水精為輿金銀為厢驂駕九龍光照諸天絳紫毛裘混混沌沌晃晃星星震動驚人但求百官江河大神龍王鬼帥藏在雲間叩頭搏頰求自披陳不聽理訴收付獄君銅枷鐵鎖鉗其喉咽衆邪惶怖不敢妄前敕辦行厨賜吾真神吾今當出召神君久藏不見十億年但捕血祀諸姦神殄窮天下剋異民祅言妄語自為神訾毁道氣𡜍妬賢皆是妖惑蟲道神但行邪僞别正真天師銜命化善人蟒蛇之鎧兼欲前邪逆妄害鐵鎖連捉頭三斬烹汝身窮竒辟邪縱橫吞比至神祀盡根元家親丈人但莫前授吾神咒爾莫前敕急急如律令天師曰吾為天地除萬殃變身人間作鬼王身長丈六頭面方銅牙鐵齒銜鋒鋩手持礕磨戴鑊湯動雷發電回天光星辰失度月慘黃顛風泄地日收光草木焦枯樹摧藏崩山裂石斷河梁車載鐵鎖棓銀鐺一月三榜六咒章募求百鬼勤豪强得便斬殺除凶殃吾持神咒誰敢當急去千里勿當殃急急如律令天師曰吾上太山謁見黃老君教吾殺鬼語我神才上呼玉女收捕非殃登天左契佩帶印章頭戴華蓋足躡魁罡左扶六甲右扶六丁前有黃神後有越章神師誅伐不避豪强先殺邪神後滅遊光何神敢前何鬼敢當縛汝置水煮汝鑊湯三日一笞五日一榜門丞捉縛玉女掠吾吏受辭竈君上章某甲無罪過不得病賢良吾含天地氣咒毒殺鬼方咒金金自銷咒木木自折咒水水自竭咒火火自滅咒山山自崩咒石石自裂咒神神自縛咒鬼鬼自殺咒禱禱自斷咒癕癕自决咒毒毒自散咒詛詛自滅天師神呪至不得相違戾急去千里急急如律令天師曰吾為天地師驅逐如風雨左手執青龍右手據白虎胸前有朱雀背上有玄武頭上有仙人足下有玉女手中三將軍十指為司馬功曹令束縛送到魁罡下徘徊三台間五星皆捉把浮遊華蓋宫徑過閭闔下敕誥太山府並及行使者收捕姦邪鬼祅魅耗亂者及時誅邪僞露尸於道左御史上天曹今以奏得下天師神咒至急急如律令謁請素車白馬君五人兵士十萬人主收某家宅中三丘五墓之鬼謁請運氣君五人兵士十萬人主收某家宅中百二十刑殺之鬼謁請都曹正君五人兵士十萬人主收某家宅中衆精百邪之鬼謁請考召君五人兵士十萬人主收某家宅中下官故氣之鬼謁請守宅神君五人兵士十萬人主收某家宅中辟邪盜賊之鬼謁請廣司君五人兵士十萬人主收某家宅中十二月建破殺之鬼謁請北城語命謀議君五人兵士十萬人主收某家宅中北時建王之鬼謁請刺史從事千二百人各官將五人兵士十萬人主收某家宅中五方瘟疫氣剔人之鬼謁請無上太和君五人兵士十萬人主收某家宅中百二十祅魅邪道之鬼天師曰欲行道法欲治身修行欲救療病苦欲求年命延長欲求過度災厄欲求白日升天欲求宅舍安穩欲求田蠶如意欲求販賣得利欲求奴婢成行欲求仕宦高遷欲求訟詞理訴欲求男女命長欲求保宜子孫欲求婦女安胎今為别請十部都曹正氣中即刺史從事素車白馬君北城詔命君天上督逆君廣司君太玄老君太和之氣一千二百人各將軍五人屯住某家中庭兵刃外向監察內外下官故氣血食之鬼祅惑之神衆精百邪千鬼萬神尸土精土毒造功立宅架屋立柱築治園墟修營家宅破壞舍屋移轉井竈動促門户捕治籬落縛束壁帳穿井掘窖填補塞孔高下之功立成之功破殺之氣悉以斬殺之并收某家宅中五殘六賊十二祅惑男女非𦍙先代咎殃及咒殺尸破邪故氣留殃妖魅寄鬼𡜍妬五虛六耗十二注詛野道夢寤顛倒縣官口舌背自消滅中宗外親前亡後死男女復連無辜之鬼客死之鬼兵死之鬼星死之鬼注死之鬼前死之鬼後死之鬼應時咒殺之鬼及諸百怪梟鳥鴉鵲百鳥妄鳴狗嗥作怪血光金光火光水光木光衣光髮光舍宅門户開閉音聲之怪甑叫釜鳴金鐵之精天蜂青蠅蟲蛇野獸狐狸六畜五毒之氣藏在宅中不肯去者伏惟太上勑下天曹應咒斬殺之如玄都鬼律不得相于奉天師神咒急急如律令臣重啓太上大道君太上老君太上丈人天師嗣師系師等三師文書事門下君將吏兵六質六直六端六慤二十四君等臣某稽首再拜上言今世微薄運劫欲盡人民凶逆相習來久外陽為善內懷豺狼但欲作惡不念行慈背面異辭共相規圖萬人之中無有一人欲求生道者乎心懷惡行𡜍妬異端俱作死事淫泆好色馳務榮祿輕孤易貧强弱相凌君臣相伐父子相言兄弟相殺母女相罵婦姑相𢙆夫婦相圖骨肉相食不避親踈是以道氣不覆故放天災於九州之內白骨千里雖好者百不遺一如此之人自為剛强抄賣婦女以為嬖妾上有五六下有三四車馬衣裘富貴奢泰任情恣意無所窮之維行鳴趨不避老少但行祅惑責領姧師更相厭固或録人形像召人名諱長付社竈波也泉水無不痛處香美齊餅求於司命欲令男女憎他愛己回心附影以為歡悅隨時祭祀遂成野道雖利目前殃考在後食人兒女盡以及身破門滅户殃及後代如此祅惑不可常事臣以姧惡故列表上奏歸命太上三天道主惟願太上敕下天曹請下吏兵六甲將軍六丁之神依咒斬殺野道之氣誅邪滅僞太上之制煞鬼生民大道正法割給吏兵如臣所上佐臣討伐立時消滅如玄都鬼律急急如律令天師曰今日甲貫野道脅今日乙斷野道髮今日丙斷野道影今日丁斷野道形今日戌斷野道手今日巳斷野道脾今日庚斷野道肝今日辛斷野道肺今日壬斷野道心今日癸斷野道尾斬野道死天野道三地野道五非主人家親不得住吾持神咒速出去江海中有窮竒共避邪將咸池食野道肉噉野道皮汝不急去死乃至天帥神咒急急如律令天師曰今日六乙野道急出六丙六丁野道自刑六戊六己野道不起六庚六辛野道不神六壬六癸野道自死六甲將軍六丁之神斬殺野道不得近人天師神咒急急如律令天師曰今日寅申野道不神今日卯酉野道不壽今日辰戌野道急出今日未丑野道不久天師神咒急急如律令天師曰五寅五卯斬殺野道五辰五巳斬殺野道妻子五午五未斬殺野道祅魅精祟五申五酉斬殺野道父母五戌五亥斬殺野道付海五子五丑斬殺野道頭首天師神咒急急如律令天師曰今日甲辰野道不神今日甲戌野道悉出今日乙庚野道不行今日丙辛野道殺身今日丁壬破野道心今日戊癸殺野道死今日甲巳殺野道棄市天師神咒急急如律令天師曰東方野道青龍蛟南方野道炎火耀西方野道白虎嘯北方野道玄武尾掉中央野道黃帝飲汝血血出毒出矣吾知汝姓名北海大神謂銜犾身長三丈頭長三尺黃金為牙齒如曲鑿面廣三尺額頸正白朝食三千暮噉八百野道不盡見推求索天師神咒急急如律令太上運氣解厄君百萬人無上太中君三千六百人無上九帝君三十一萬人無上太和君官將九宫十二營衛諸天虛空大小一切百姓有病苦者告諸弟子大一太玄元始氣三十萬億諸國祭酒今牒中國諸姓字依名殺之若有居諸山鬼林鬼草鬼木鬼冢鬼墓鬼家鬼他鬼水邊鬼道傍鬼中鬼外鬼飲食鬼卧時鬼青赤黃白黑五色鬼有長鬼短鬼大地小鬼廣狡鬼夢寐鬼朝起鬼夜行鬼步行鬼飛行鬼問人鬼呼唤人鬼傷人鬼嗔恚鬼急疾鬼行病放毒鬼五瘟鬼剔人鬼有急咒之鬼自摧滅正一真人告諸祭酒弟子若能受吾是經有急頭痛目眩寒熱不調常讀此經魔魅破碎不敢當吾咒也若有官獄水火之災亦讀此經宅中有鬼亦讀此經元君諱字當讀是經有諸高大廣長鬼神苦撓天下暴酷百姓鬼神行病鬼神行疫鬼神行氣鬼神有外𦍙鬼思想鬼癃殘鬼魍魎鬼熒惑鬼遊逸鎮鬼厭咒鬼伏尸鬼肛死鬼淫死鬼老死鬼宫舍鬼停傳鬼軍營鬼獄死鬼市死鬼驚人鬼木死鬼火死鬼水死鬼客死鬼未葬鬼道路鬼兵死鬼星死鬼血死鬼逋禱鬼斬死鬼絞死鬼逢忤鬼自刺鬼恐人鬼强死鬼兩頭鬼騎乘鬼車駕鬼山鬼神鬼土鬼山頭鬼水中鬼據梁鬼道中鬼羌胡鬼蠻夷鬼忌誕鬼蟲獠鬼精神鬼百蟲鬼井竈池澤鬼萬道鬼遮藏鬼不神鬼詐稱鬼一切大小百精諸鬼皆不得耗病某家男女之身鬼不隨咒各頭破作十分身首糜碎當誦是經咒鬼名字病即除差所向皆通此經功德聖力難量於是諸祭酒等仰歎靈文欽承法訓志願奉持稽首而退太上正一咒鬼經
